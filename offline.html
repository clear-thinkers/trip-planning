<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trip Planner - Offline</title>
    <meta name="theme-color" content="#ffffff" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        background: #f7f8fa;
        color: #1f2933;
        text-align: center;
        padding: 24px;
        box-sizing: border-box;
      }
      .card {
        background: #ffffff;
        border-radius: 8px;
        padding: 40px 32px;
        max-width: 360px;
        box-shadow: 0 18px 45px rgba(31, 41, 51, 0.08);
      }
      h1 { font-size: 1.25rem; margin: 0 0 8px; }
      p  { margin: 0 0 24px; color: #6b7280; font-size: 0.95rem; }
      a  {
        display: inline-block;
        background: #2f6f73;
        color: #ffffff;
        text-decoration: none;
        padding: 10px 20px;
        border-radius: 6px;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You're offline</h1>
      <p>Trip Planner needs a connection the first time it loads. Once loaded, it works fully offline. Please reconnect and try again.</p>
      <a href="./">Try again</a>
    </div>
  </body>
</html>
