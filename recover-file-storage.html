<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Recover Trip Planner File Storage</title>
    <style>
      body {
        background: #f7f8fa;
        color: #1f2933;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 24px;
      }

      .card {
        background: #ffffff;
        border: 1px solid #d7dee8;
        border-radius: 8px;
        box-shadow: 0 18px 45px rgba(31, 41, 51, 0.08);
        margin: 0 auto;
        max-width: 860px;
        padding: 20px;
      }

      button {
        background: #2f6f73;
        border: 1px solid #2f6f73;
        border-radius: 8px;
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        min-height: 40px;
        padding: 0 14px;
      }

      pre {
        background: #f8fafc;
        border: 1px solid #d7dee8;
        border-radius: 8px;
        margin-top: 16px;
        overflow: auto;
        padding: 14px;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .muted {
        color: #6b7280;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="muted">Trip Planner Recovery</p>
      <h1>Recover file-based localStorage</h1>
      <p>
        Open this page directly from the same browser/profile where you used the old `file:///...` Trip Planner.
        If data is found, download it as JSON, then run `node serve-local.mjs` and import that JSON into the localhost app.
      </p>

      <button id="downloadButton" type="button">Download saved storage</button>
      <p class="muted" id="status"></p>
      <pre id="preview"></pre>
    </main>

    <script>
      const STORAGE_KEY = "trip-planner-v1";
      const downloadButton = document.getElementById("downloadButton");
      const status = document.getElementById("status");
      const preview = document.getElementById("preview");

      function readStorage() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) {
            status.textContent = "No data found under trip-planner-v1 in this file-based browser storage.";
            preview.textContent = "";
            return null;
          }
          status.textContent = "Saved data found. You can download it below.";
          preview.textContent = raw;
          return raw;
        } catch (error) {
          status.textContent = `Could not read localStorage: ${error.message}`;
          preview.textContent = "";
          return null;
        }
      }

      downloadButton.addEventListener("click", () => {
        const raw = readStorage();
        if (!raw) return;
        const blob = new Blob([raw], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "trip-planner-file-storage.json";
        link.click();
        URL.revokeObjectURL(url);
      });

      readStorage();
    </script>
  </body>
</html>
