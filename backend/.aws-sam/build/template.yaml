AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Trip Planner - serverless backend (API Gateway + Lambda + DynamoDB +
  Cognito)
Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    Environment:
      Variables:
        TABLE_NAME:
          Ref: TripsTable
Resources:
  TripsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: trip-planner-trips
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: id
        AttributeType: S
      KeySchema:
      - AttributeName: id
        KeyType: HASH
  IdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      IdentityPoolName: TripPlannerIdentityPool
      AllowUnauthenticatedIdentities: true
  UnauthenticatedRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Federated: cognito-identity.amazonaws.com
          Action: sts:AssumeRoleWithWebIdentity
          Condition:
            StringEquals:
              cognito-identity.amazonaws.com:aud:
                Ref: IdentityPool
            ForAnyValue:StringLike:
              cognito-identity.amazonaws.com:amr: unauthenticated
      Policies:
      - PolicyName: InvokeApi
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action: execute-api:Invoke
            Resource:
              Fn::Sub: arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${TripPlannerApi}/prod/*
  IdentityPoolRoleAttachment:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Properties:
      IdentityPoolId:
        Ref: IdentityPool
      Roles:
        unauthenticated:
          Fn::GetAtt:
          - UnauthenticatedRole
          - Arn
  TripPlannerApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: '''GET,POST,PUT,PATCH,OPTIONS'''
        AllowHeaders: '''Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Amz-User-Agent'''
        AllowOrigin: '''*'''
      Auth:
        DefaultAuthorizer: AWS_IAM
        AddDefaultAuthorizerToCorsPreflight: false
  GatewayResponse4XX:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId:
        Ref: TripPlannerApi
      ResponseType: DEFAULT_4XX
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: '''*'''
        gatewayresponse.header.Access-Control-Allow-Headers: '''Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Amz-User-Agent'''
  GatewayResponse5XX:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId:
        Ref: TripPlannerApi
      ResponseType: DEFAULT_5XX
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: '''*'''
        gatewayresponse.header.Access-Control-Allow-Headers: '''Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Amz-User-Agent'''
  PostTripFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: PostTripFunction
      Handler: post-trip/index.handler
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: TripsTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId:
              Ref: TripPlannerApi
            Path: /trips
            Method: post
    Metadata:
      SamResourceId: PostTripFunction
  GetTripFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetTripFunction
      Handler: get-trip/index.handler
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Ref: TripsTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId:
              Ref: TripPlannerApi
            Path: /trips/{id}
            Method: get
    Metadata:
      SamResourceId: GetTripFunction
  PutTripFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: PutTripFunction
      Handler: put-trip/index.handler
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: TripsTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId:
              Ref: TripPlannerApi
            Path: /trips/{id}
            Method: put
    Metadata:
      SamResourceId: PutTripFunction
  PatchPermissionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: PatchPermissionFunction
      Handler: patch-permission/index.handler
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: TripsTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId:
              Ref: TripPlannerApi
            Path: /trips/{id}/permission
            Method: patch
    Metadata:
      SamResourceId: PatchPermissionFunction
Outputs:
  ApiUrl:
    Description: Paste into js/aws-config.js as API_BASE_URL
    Value:
      Fn::Sub: https://${TripPlannerApi}.execute-api.${AWS::Region}.amazonaws.com/prod
    Export:
      Name: TripPlannerApiUrl
  IdentityPoolId:
    Description: Paste into js/aws-config.js as IDENTITY_POOL_ID
    Value:
      Ref: IdentityPool
    Export:
      Name: TripPlannerIdentityPoolId
  Region:
    Description: Paste into js/aws-config.js as AWS_REGION
    Value:
      Ref: AWS::Region
