AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Trip Planner - serverless backend (API Gateway + Lambda + DynamoDB +
  Cognito)
Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    Environment:
      Variables:
        TABLE_NAME:
          Ref: TripsTable
Resources:
  TripsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: trip-planner-trips
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: id
        AttributeType: S
      KeySchema:
      - AttributeName: id
        KeyType: HASH
  IdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      IdentityPoolName: TripPlannerIdentityPool
      AllowUnauthenticatedIdentities: true
  UnauthenticatedRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Federated: cognito-identity.amazonaws.com
          Action: sts:AssumeRoleWithWebIdentity
          Condition:
            StringEquals:
              cognito-identity.amazonaws.com:aud:
                Ref: IdentityPool
            ForAnyValue:StringLike:
              cognito-identity.amazonaws.com:amr: unauthenticated
      Policies:
      - PolicyName: InvokeApi
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action: execute-api:Invoke
            Resource:
              Fn::Sub: arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${TripPlannerApi}/prod/*
  IdentityPoolRoleAttachment:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Properties:
      IdentityPoolId:
        Ref: IdentityPool
      Roles:
        unauthenticated:
          Fn::GetAtt:
          - UnauthenticatedRole
          - Arn
  TripPlannerApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      DefinitionBody:
        swagger: '2.0'
        info:
          title: TripPlannerApi
          version: '1.0'
        securityDefinitions:
          sigv4:
            type: apiKey
            name: Authorization
            in: header
            x-amazon-apigateway-authtype: awsSigv4
        paths:
          /trips:
            post:
              security:
              - sigv4: []
              x-amazon-apigateway-integration:
                type: aws_proxy
                httpMethod: POST
                uri:
                  Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${PostTripFunction.Arn}/invocations
                passthroughBehavior: when_no_match
              responses: {}
            options:
              x-amazon-apigateway-integration:
                type: mock
                requestTemplates:
                  application/json: '{"statusCode": 200}'
                responses:
                  default:
                    statusCode: '200'
                    responseParameters:
                      method.response.header.Access-Control-Allow-Headers: '''Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Amz-User-Agent'''
                      method.response.header.Access-Control-Allow-Methods: '''GET,POST,PUT,PATCH,OPTIONS'''
                      method.response.header.Access-Control-Allow-Origin: '''*'''
              responses:
                '200':
                  description: OK
                  headers:
                    Access-Control-Allow-Headers:
                      type: string
                    Access-Control-Allow-Methods:
                      type: string
                    Access-Control-Allow-Origin:
                      type: string
          /trips/{id}:
            get:
              security:
              - sigv4: []
              parameters:
              - name: id
                in: path
                required: true
                type: string
              x-amazon-apigateway-integration:
                type: aws_proxy
                httpMethod: POST
                uri:
                  Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetTripFunction.Arn}/invocations
                passthroughBehavior: when_no_match
              responses: {}
            put:
              security:
              - sigv4: []
              parameters:
              - name: id
                in: path
                required: true
                type: string
              x-amazon-apigateway-integration:
                type: aws_proxy
                httpMethod: POST
                uri:
                  Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${PutTripFunction.Arn}/invocations
                passthroughBehavior: when_no_match
              responses: {}
            options:
              x-amazon-apigateway-integration:
                type: mock
                requestTemplates:
                  application/json: '{"statusCode": 200}'
                responses:
                  default:
                    statusCode: '200'
                    responseParameters:
                      method.response.header.Access-Control-Allow-Headers: '''Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Amz-User-Agent'''
                      method.response.header.Access-Control-Allow-Methods: '''GET,POST,PUT,PATCH,OPTIONS'''
                      method.response.header.Access-Control-Allow-Origin: '''*'''
              responses:
                '200':
                  description: OK
                  headers:
                    Access-Control-Allow-Headers:
                      type: string
                    Access-Control-Allow-Methods:
                      type: string
                    Access-Control-Allow-Origin:
                      type: string
          /trips/{id}/permission:
            patch:
              security:
              - sigv4: []
              parameters:
              - name: id
                in: path
                required: true
                type: string
              x-amazon-apigateway-integration:
                type: aws_proxy
                httpMethod: POST
                uri:
                  Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${PatchPermissionFunction.Arn}/invocations
                passthroughBehavior: when_no_match
              responses: {}
            options:
              x-amazon-apigateway-integration:
                type: mock
                requestTemplates:
                  application/json: '{"statusCode": 200}'
                responses:
                  default:
                    statusCode: '200'
                    responseParameters:
                      method.response.header.Access-Control-Allow-Headers: '''Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Amz-User-Agent'''
                      method.response.header.Access-Control-Allow-Methods: '''GET,POST,PUT,PATCH,OPTIONS'''
                      method.response.header.Access-Control-Allow-Origin: '''*'''
              responses:
                '200':
                  description: OK
                  headers:
                    Access-Control-Allow-Headers:
                      type: string
                    Access-Control-Allow-Methods:
                      type: string
                    Access-Control-Allow-Origin:
                      type: string
  GatewayResponse4XX:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId:
        Ref: TripPlannerApi
      ResponseType: DEFAULT_4XX
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: '''*'''
        gatewayresponse.header.Access-Control-Allow-Headers: '''Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Amz-User-Agent'''
  GatewayResponse5XX:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId:
        Ref: TripPlannerApi
      ResponseType: DEFAULT_5XX
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: '''*'''
        gatewayresponse.header.Access-Control-Allow-Headers: '''Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Amz-User-Agent'''
  GuestRoleApiPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: TripPlannerGuestInvokeApi
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Action: execute-api:Invoke
          Resource:
            Fn::Sub: arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${TripPlannerApi}/*
      Roles:
      - trip-planner-guest-role
  PostTripFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: PostTripFunction
      Handler: post-trip/index.handler
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: TripsTable
    Metadata:
      SamResourceId: PostTripFunction
  PostTripPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName:
        Fn::GetAtt:
        - PostTripFunction
        - Arn
      Principal: apigateway.amazonaws.com
      SourceArn:
        Fn::Sub: arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${TripPlannerApi}/*
  GetTripFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetTripFunction
      Handler: get-trip/index.handler
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Ref: TripsTable
    Metadata:
      SamResourceId: GetTripFunction
  GetTripPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName:
        Fn::GetAtt:
        - GetTripFunction
        - Arn
      Principal: apigateway.amazonaws.com
      SourceArn:
        Fn::Sub: arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${TripPlannerApi}/*
  PutTripFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: PutTripFunction
      Handler: put-trip/index.handler
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: TripsTable
    Metadata:
      SamResourceId: PutTripFunction
  PutTripPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName:
        Fn::GetAtt:
        - PutTripFunction
        - Arn
      Principal: apigateway.amazonaws.com
      SourceArn:
        Fn::Sub: arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${TripPlannerApi}/*
  PatchPermissionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: PatchPermissionFunction
      Handler: patch-permission/index.handler
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: TripsTable
    Metadata:
      SamResourceId: PatchPermissionFunction
  PatchPermissionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName:
        Fn::GetAtt:
        - PatchPermissionFunction
        - Arn
      Principal: apigateway.amazonaws.com
      SourceArn:
        Fn::Sub: arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${TripPlannerApi}/*
Outputs:
  ApiUrl:
    Description: Paste into js/aws-config.js as API_BASE_URL
    Value:
      Fn::Sub: https://${TripPlannerApi}.execute-api.${AWS::Region}.amazonaws.com/prod
    Export:
      Name: TripPlannerApiUrl
  IdentityPoolId:
    Description: Paste into js/aws-config.js as IDENTITY_POOL_ID
    Value:
      Ref: IdentityPool
    Export:
      Name: TripPlannerIdentityPoolId
  Region:
    Description: Paste into js/aws-config.js as AWS_REGION
    Value:
      Ref: AWS::Region
