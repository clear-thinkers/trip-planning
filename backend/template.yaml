AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Trip Planner - serverless backend (API Gateway + Lambda + DynamoDB + Cognito)

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    Environment:
      Variables:
        TABLE_NAME: !Ref TripsTable

Resources:

  # ── DynamoDB ─────────────────────────────────────────────────────────────────
  TripsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: trip-planner-trips
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  # ── Cognito Identity Pool (anonymous identities) ──────────────────────────────
  IdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      IdentityPoolName: TripPlannerIdentityPool
      AllowUnauthenticatedIdentities: true

  UnauthenticatedRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: cognito-identity.amazonaws.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                cognito-identity.amazonaws.com:aud: !Ref IdentityPool
              ForAnyValue:StringLike:
                cognito-identity.amazonaws.com:amr: unauthenticated
      Policies:
        - PolicyName: InvokeApi
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: execute-api:Invoke
                Resource: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${TripPlannerApi}/prod/*'

  IdentityPoolRoleAttachment:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Properties:
      IdentityPoolId: !Ref IdentityPool
      Roles:
        unauthenticated: !GetAtt UnauthenticatedRole.Arn

  # ── API Gateway ───────────────────────────────────────────────────────────────
  TripPlannerApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'GET,POST,PUT,PATCH,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Amz-User-Agent'"
        AllowOrigin: "'*'"

  # ── Gateway Responses (ensures CORS headers on all error types) ──────────────
  GatewayResponse4XX:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId: !Ref TripPlannerApi
      ResponseType: DEFAULT_4XX
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Amz-User-Agent'"

  GatewayResponse5XX:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId: !Ref TripPlannerApi
      ResponseType: DEFAULT_5XX
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Amz-User-Agent'"

  GatewayResponseIntegrationFailure:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId: !Ref TripPlannerApi
      ResponseType: INTEGRATION_FAILURE
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Amz-User-Agent'"

  GatewayResponseIntegrationTimeout:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId: !Ref TripPlannerApi
      ResponseType: INTEGRATION_TIMEOUT
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Amz-User-Agent'"

  GatewayResponseApiConfigError:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId: !Ref TripPlannerApi
      ResponseType: API_CONFIGURATION_ERROR
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Amz-User-Agent'"

  GatewayResponseAuthorizerFailure:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId: !Ref TripPlannerApi
      ResponseType: AUTHORIZER_FAILURE
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Amz-User-Agent'"

  GatewayResponseAuthorizerConfigError:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId: !Ref TripPlannerApi
      ResponseType: AUTHORIZER_CONFIGURATION_ERROR
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Amz-User-Agent'"

  # ── IAM: grant the pre-existing guest role access to invoke this API ─────────
  GuestRoleApiPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: TripPlannerGuestInvokeApi
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: execute-api:Invoke
            Resource: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${TripPlannerApi}/*'
      Roles:
        - trip-planner-guest-role

  # ── Lambda Functions ──────────────────────────────────────────────────────────
  PostTripFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/
      Handler: post-trip/index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TripsTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref TripPlannerApi
            Path: /trips
            Method: post
            Auth:
              Authorizer: AWS_IAM

  PostTripPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt PostTripFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${TripPlannerApi}/*'

  GetTripFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/
      Handler: get-trip/index.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref TripsTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref TripPlannerApi
            Path: /trips/{id}
            Method: get
            Auth:
              Authorizer: AWS_IAM

  GetTripPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt GetTripFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${TripPlannerApi}/*'

  PutTripFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/
      Handler: put-trip/index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TripsTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref TripPlannerApi
            Path: /trips/{id}
            Method: put
            Auth:
              Authorizer: AWS_IAM

  PutTripPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt PutTripFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${TripPlannerApi}/*'

  PatchPermissionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/
      Handler: patch-permission/index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TripsTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref TripPlannerApi
            Path: /trips/{id}/permission
            Method: patch
            Auth:
              Authorizer: AWS_IAM

  PatchPermissionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt PatchPermissionFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${TripPlannerApi}/*'

Outputs:
  ApiUrl:
    Description: Paste into js/aws-config.js as API_BASE_URL
    Value: !Sub 'https://${TripPlannerApi}.execute-api.${AWS::Region}.amazonaws.com/prod'
    Export:
      Name: TripPlannerApiUrl
  IdentityPoolId:
    Description: Paste into js/aws-config.js as IDENTITY_POOL_ID
    Value: !Ref IdentityPool
    Export:
      Name: TripPlannerIdentityPoolId
  Region:
    Description: Paste into js/aws-config.js as AWS_REGION
    Value: !Ref AWS::Region
