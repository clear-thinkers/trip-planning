AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Trip Planner - serverless backend (API Gateway + Lambda + DynamoDB + Cognito)

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    Environment:
      Variables:
        TABLE_NAME: !Ref TripsTable

Resources:

  # ── DynamoDB ─────────────────────────────────────────────────────────────────
  TripsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: trip-planner-trips
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  # ── Cognito Identity Pool (anonymous identities) ──────────────────────────────
  IdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      IdentityPoolName: TripPlannerIdentityPool
      AllowUnauthenticatedIdentities: true

  UnauthenticatedRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: cognito-identity.amazonaws.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                cognito-identity.amazonaws.com:aud: !Ref IdentityPool
              ForAnyValue:StringLike:
                cognito-identity.amazonaws.com:amr: unauthenticated
      Policies:
        - PolicyName: InvokeApi
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: execute-api:Invoke
                Resource: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${TripPlannerApi}/prod/*'

  IdentityPoolRoleAttachment:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Properties:
      IdentityPoolId: !Ref IdentityPool
      Roles:
        unauthenticated: !GetAtt UnauthenticatedRole.Arn

  # ── API Gateway ───────────────────────────────────────────────────────────────
  # DefinitionBody owns the integrations so SAM never injects credentials.
  # AWS_IAM auth is declared via the sigv4 security scheme (x-amazon-apigateway-authtype).
  # Resource-based Lambda permissions (below) are used for invocation instead.
  TripPlannerApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      DefinitionBody:
        swagger: "2.0"
        info:
          title: TripPlannerApi
          version: "1.0"
        securityDefinitions:
          sigv4:
            type: apiKey
            name: Authorization
            in: header
            x-amazon-apigateway-authtype: awsSigv4
        paths:
          /trips:
            post:
              security:
                - sigv4: []
              x-amazon-apigateway-integration:
                type: aws_proxy
                httpMethod: POST
                uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${PostTripFunction.Arn}/invocations'
                passthroughBehavior: when_no_match
              responses: {}
            options:
              x-amazon-apigateway-integration:
                type: mock
                requestTemplates:
                  application/json: '{"statusCode": 200}'
                responses:
                  default:
                    statusCode: "200"
                    responseParameters:
                      method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Amz-User-Agent'"
                      method.response.header.Access-Control-Allow-Methods: "'GET,POST,PUT,PATCH,OPTIONS'"
                      method.response.header.Access-Control-Allow-Origin: "'*'"
              responses:
                "200":
                  description: OK
                  headers:
                    Access-Control-Allow-Headers:
                      type: string
                    Access-Control-Allow-Methods:
                      type: string
                    Access-Control-Allow-Origin:
                      type: string
          /trips/{id}:
            get:
              security:
                - sigv4: []
              parameters:
                - name: id
                  in: path
                  required: true
                  type: string
              x-amazon-apigateway-integration:
                type: aws_proxy
                httpMethod: POST
                uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetTripFunction.Arn}/invocations'
                passthroughBehavior: when_no_match
              responses: {}
            put:
              security:
                - sigv4: []
              parameters:
                - name: id
                  in: path
                  required: true
                  type: string
              x-amazon-apigateway-integration:
                type: aws_proxy
                httpMethod: POST
                uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${PutTripFunction.Arn}/invocations'
                passthroughBehavior: when_no_match
              responses: {}
            options:
              x-amazon-apigateway-integration:
                type: mock
                requestTemplates:
                  application/json: '{"statusCode": 200}'
                responses:
                  default:
                    statusCode: "200"
                    responseParameters:
                      method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Amz-User-Agent'"
                      method.response.header.Access-Control-Allow-Methods: "'GET,POST,PUT,PATCH,OPTIONS'"
                      method.response.header.Access-Control-Allow-Origin: "'*'"
              responses:
                "200":
                  description: OK
                  headers:
                    Access-Control-Allow-Headers:
                      type: string
                    Access-Control-Allow-Methods:
                      type: string
                    Access-Control-Allow-Origin:
                      type: string
          /trips/{id}/permission:
            patch:
              security:
                - sigv4: []
              parameters:
                - name: id
                  in: path
                  required: true
                  type: string
              x-amazon-apigateway-integration:
                type: aws_proxy
                httpMethod: POST
                uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${PatchPermissionFunction.Arn}/invocations'
                passthroughBehavior: when_no_match
              responses: {}
            options:
              x-amazon-apigateway-integration:
                type: mock
                requestTemplates:
                  application/json: '{"statusCode": 200}'
                responses:
                  default:
                    statusCode: "200"
                    responseParameters:
                      method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Amz-User-Agent'"
                      method.response.header.Access-Control-Allow-Methods: "'GET,POST,PUT,PATCH,OPTIONS'"
                      method.response.header.Access-Control-Allow-Origin: "'*'"
              responses:
                "200":
                  description: OK
                  headers:
                    Access-Control-Allow-Headers:
                      type: string
                    Access-Control-Allow-Methods:
                      type: string
                    Access-Control-Allow-Origin:
                      type: string

  # ── Gateway Responses (CORS headers on API Gateway error responses) ───────────
  GatewayResponse4XX:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId: !Ref TripPlannerApi
      ResponseType: DEFAULT_4XX
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Amz-User-Agent'"

  GatewayResponse5XX:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId: !Ref TripPlannerApi
      ResponseType: DEFAULT_5XX
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Amz-User-Agent'"

  # ── IAM: grant the pre-existing guest role execute-api:Invoke on this API ─────
  GuestRoleApiPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: TripPlannerGuestInvokeApi
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: execute-api:Invoke
            Resource: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${TripPlannerApi}/*'
      Roles:
        - trip-planner-guest-role

  # ── Lambda Functions ──────────────────────────────────────────────────────────
  PostTripFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/
      Handler: post-trip/index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TripsTable

  PostTripPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt PostTripFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${TripPlannerApi}/*'

  GetTripFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/
      Handler: get-trip/index.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref TripsTable

  GetTripPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt GetTripFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${TripPlannerApi}/*'

  PutTripFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/
      Handler: put-trip/index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TripsTable

  PutTripPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt PutTripFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${TripPlannerApi}/*'

  PatchPermissionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/
      Handler: patch-permission/index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TripsTable

  PatchPermissionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt PatchPermissionFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${TripPlannerApi}/*'

Outputs:
  ApiUrl:
    Description: Paste into js/aws-config.js as API_BASE_URL
    Value: !Sub 'https://${TripPlannerApi}.execute-api.${AWS::Region}.amazonaws.com/prod'
    Export:
      Name: TripPlannerApiUrl
  IdentityPoolId:
    Description: Paste into js/aws-config.js as IDENTITY_POOL_ID
    Value: !Ref IdentityPool
    Export:
      Name: TripPlannerIdentityPoolId
  Region:
    Description: Paste into js/aws-config.js as AWS_REGION
    Value: !Ref AWS::Region
